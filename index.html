<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>AI MV Auto Director</title>
  <style>
    body{
      font-family:Arial;
      background:#0f172a;
      color:white;
      text-align:center;
      padding:40px;
    }
    input,select{
      padding:10px;
      margin:8px;
      width:250px;
      border-radius:8px;
      border:none;
    }
    button{
      padding:12px 20px;
      border:none;
      border-radius:8px;
      background:#00f5a0;
      font-weight:bold;
      cursor:pointer;
    }
    #result{
      margin-top:30px;
      text-align:left;
      background:#111827;
      padding:20px;
      border-radius:10px;
      white-space:pre-wrap;
    }
  </style>
</head>
<body>

<h1>🎬 AI MV Auto Director</h1>

<input id="prompt" placeholder="Song concept" /><br>

<select id="style">
  <option>Cinematic</option>
  <option>Dark Moody</option>
  <option>Pop Colorful</option>
</select><br>

<select id="duration">
  <option>3 minutes</option>
  <option>4 minutes</option>
  <option>5 minutes</option>
</select><br>

<button onclick="generate()">Generate</button>

<div id="result"></div>

<script>
async function generate(){

  const prompt=document.getElementById("prompt").value;
  const style=document.getElementById("style").value;
  const duration=document.getElementById("duration").value;

  document.getElementById("result").innerHTML="⏳ Generating storyboard...";

  const res=await fetch("/generate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt,style,duration})
  });

  const data=await res.json();

  document.getElementById("result").innerHTML=
    JSON.stringify(data,null,2);
}
</script>

</body>
</html>
